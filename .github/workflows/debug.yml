name: Debug Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - android
          - ios

jobs:

  source-scan:
    name: Source Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required build files
        run: |
          MISSING=0
          for F in handheld/jni/Android.mk handheld/jni/Application.mk; do
            if [ -f "$F" ]; then
              echo "FOUND   $F"
            else
              echo "MISSING $F"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Print Application.mk
        run: |
          if [ -f handheld/jni/Application.mk ]; then
            cat handheld/jni/Application.mk
            echo ""
            # Warn if APP_STL is set to a modern value that NDK r10e won't have
            if grep -qE 'APP_STL\s*:=\s*(c\+\+_static|c\+\+_shared|libc\+\+)' \
                handheld/jni/Application.mk; then
              echo "WARNING: APP_STL is set to a modern STL. This source requires stlport_static."
              echo "         Change APP_STL to stlport_static in Application.mk."
            fi
          fi

      - name: Source file counts
        run: |
          find handheld/ tools/ -not -path "*/.git/*" \
            -regex ".*\.\(cpp\|cc\|c\|h\|hpp\|m\|mm\|java\)$" 2>/dev/null \
            | awk -F. '{print $NF}' | sort | uniq -c | sort -rn

      - name: Version defines
        run: |
          grep -rn --include="*.h" --include="*.hpp" --include="*.cpp" \
            -E '#define[[:space:]]+(MCPE_VERSION|APP_VERSION|VERSION_STRING|GAME_VERSION|CLIENT_VERSION)' \
            handheld/ 2>/dev/null || echo "none found"

      - name: Debug log macro usage (first 30 matches)
        run: |
          grep -rn --include="*.h" --include="*.cpp" \
            -E '\b(LOG|LOGD|LOGI|LOGE|LOGW|LOG_DEBUG|assert\s*\(|_DEBUG)\b' \
            handheld/jni/ 2>/dev/null | head -30 || echo "none found"

  build-android-debug:
    name: Android Debug (NDK r10e / GCC 4.8)
    runs-on: ubuntu-22.04
    needs: source-scan
    if: inputs.platform == 'android' || inputs.platform == 'both'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download and extract NDK r10e
        run: |
          curl -fL \
            "https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip" \
            -o ndk-r10e.zip
          unzip -q ndk-r10e.zip
          echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r10e" >> $GITHUB_ENV

      - name: Verify NDK
        run: $ANDROID_NDK_HOME/ndk-build --version

      - name: Build debug
        run: |
          chmod +x build_android.sh
          ./build_android.sh debug

      - name: Check symbol presence in unstripped libs
        run: |
          # obj/ contains the unstripped builds; libs/ contains stripped copies
          find handheld/obj -name "*.so" 2>/dev/null | while read -r f; do
            SYMS=$(nm "$f" 2>/dev/null | grep -c ' T ' || echo 0)
            echo "$f  ($SYMS exported text symbols)"
          done

      # Unstripped libs from obj/ are uploaded because they contain debug symbols
      # needed for crash symbolication. The stripped libs/ copies are also kept.
      - name: Upload unstripped debug libs
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-unstripped-${{ github.run_number }}
          path: handheld/obj/**/*.so
          retention-days: 7
          if-no-files-found: error

      - name: Upload stripped debug libs
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-libs-${{ github.run_number }}
          path: handheld/libs/**/*.so
          retention-days: 7
          if-no-files-found: error

  build-ios-debug:
    name: iOS Debug (Xcode)
    runs-on: macos-13
    needs: source-scan
    if: inputs.platform == 'ios' || inputs.platform == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Locate Xcode project
        run: |
          XCPROJ=$(find . -name "*.xcodeproj" -not -path "*/.git/*" | head -1)
          if [ -z "$XCPROJ" ]; then
            echo "ERROR: No .xcodeproj found."
            exit 1
          fi
          echo "Found: $XCPROJ"

      - name: Build debug
        run: |
          chmod +x build_ios.sh
          ./build_ios.sh debug

      # dSYM bundles are uploaded alongside the .app for crash symbolication
      - name: Upload iOS debug build and dSYM
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-build-${{ github.run_number }}
          path: build/ios/Build/Products/Debug-iphonesimulator/
          retention-days: 7
          if-no-files-found: error

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-android-debug, build-ios-debug]
    if: always()

    steps:
      - name: Write job summary
        run: |
          android="${{ needs.build-android-debug.result }}"
          ios="${{ needs.build-ios-debug.result }}"

          {
            echo "## Debug Build Results"
            echo ""
            echo "| Platform | Result |"
            echo "|----------|--------|"
            echo "| Android (NDK r10e / GCC 4.8) | $android |"
            echo "| iOS (Xcode / iphonesimulator) | $ios |"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
          } >> $GITHUB_STEP_SUMMARY
